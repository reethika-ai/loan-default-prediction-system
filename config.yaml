data_ingestion:
  raw_data_path: artifacts/raw.csv
  train_data_path: artifacts/train.csv
  test_data_path: artifacts/test.csv
data_validation:
  required_columns:
    - Gender
    - Married
    - Dependents
    - ApplicantIncome
    - LoanAmount
    - Credit_History
    - Loan_Status
data_transformation:
  preprocessor_path: artifacts/preprocessor.pkl
  target_column: Loan_Status
  numerical_columns:
    - ApplicantIncome
    - LoanAmount
  categorical_columns:
    - Gender
    - Married
    - Dependents
    - Credit_History